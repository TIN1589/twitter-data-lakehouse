# =============================================================================
# Docker Compose — Twitter Data Lakehouse
# OPTIMIZED for AWS EC2 t3.micro (1GB RAM + 4GB Swap, Ubuntu 22.04)
#
# Memory Budget (1024MB physical + 4096MB swap = 5120MB total):
#   OS + Docker daemon:  ~200MB (reserved)
#   MinIO:                200MB (limit) + 256MB swap
#   Drill:                384MB (limit) + 384MB swap  ← heaviest (JVM)
#   Superset:             256MB (limit) + 384MB swap
#   Postgres:             100MB (limit) + 128MB swap
#   Airflow Scheduler:    200MB (limit) + 300MB swap
#   Airflow Webserver:    200MB (limit) + 300MB swap
#   ─────────────────────────────────────────────
#   Total physical:      ~1340MB (uses swap for burst)
#   Total swap:          ~1752MB (within 4GB swap budget)
# =============================================================================

x-common:
  &common
  image: lakehouse-airflow
  build:
    context: .
    dockerfile: airflow.Dockerfile
  user: "${AIRFLOW_UID:-50000}:0"
  env_file:
    - .env
  volumes:
    - ./app/dags:/opt/airflow/dags
    - ./app/logs:/opt/airflow/logs
    - ./conf/airflow/webserver_config.py:/opt/airflow/webserver_config.py:ro
  networks:
    - lakehouse

x-depends-on:
  &depends-on
  depends_on:
    postgres:
      condition: service_healthy
    airflow-init:
      condition: service_completed_successfully

networks:
  lakehouse:
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # MinIO — DISABLED (replaced by Amazon S3)
  # Role: Cloud Storage (Vinh, Tín)
  # NOTE: Tắt MinIO để tiết kiệm ~200MB RAM trên EC2 t3.micro
  #       Dữ liệu mới đã được đẩy thẳng lên Amazon S3 (ap-southeast-1)
  # ---------------------------------------------------------------------------
  # minio:
  #   image: minio/minio:RELEASE.2024-01-05T22-17-24Z
  #   ... (disabled - replaced by Amazon S3)

  # ---------------------------------------------------------------------------
  # Apache Drill — Distributed SQL Query Engine
  # ---------------------------------------------------------------------------
  # Apache Drill — DISABLED (replaced by Amazon Athena)
  # Role: Cloud Compute (Hoàng, Triệu)
  # NOTE: Tắt Drill để tiết kiệm 384MB RAM trên EC2 t3.micro
  #       Thay thế bằng Amazon Athena (serverless, pay-per-query ~$0/tuần)
  # ---------------------------------------------------------------------------
  # drill:
  #   image: apache/drill:1.21.1
  #   ... (disabled - see git history)

  # ---------------------------------------------------------------------------
  # Apache Superset — BI & Visualization
  # Role: Cloud BI & Visualization (Hoàng, Triệu)
  # ---------------------------------------------------------------------------
  superset:
    build:
      context: .
      dockerfile: superset_drill.Dockerfile
    restart: unless-stopped
    ports:
      - '8088:8088'
    env_file:
      - .env
    volumes:
      - superset-data:/app/superset_home
    environment:
      # >>> MEM: Superset metadata cache nhỏ hơn
      - SUPERSET_WEBSERVER_TIMEOUT=300
      - SQLLAB_TIMEOUT=300
      - SUPERSET_SQLLAB_ASYNC_TIME_LIMIT_SEC=300
    command: >
      bash -c "
      export SUPERSET_SECRET_KEY=$${SUPERSET_SECRET_KEY:-thisisasecretkeythatcanbeanystring123456789} &&
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Admin --lastname Admin --email admin@admin.com --password admin || true &&
      superset init &&
      gunicorn --bind 0.0.0.0:8088 --workers 1 --threads 2 --timeout 300 --limit-request-line 0 --max-requests 50 --max-requests-jitter 10 'superset.app:create_app()'
      "
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    mem_limit: 256m
    memswap_limit: 640m
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # PostgreSQL — Airflow Metadata Database
  # Role: Cloud Infra & DevOps (Vinh, Tín)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:13-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    env_file:
      - .env
    environment:
      # >>> MEM: Postgres tuning cho low-memory environment
      - POSTGRES_SHARED_BUFFERS=32MB
      - POSTGRES_WORK_MEM=2MB
      - POSTGRES_MAINTENANCE_WORK_MEM=16MB
      - POSTGRES_EFFECTIVE_CACHE_SIZE=64MB
    command: >
      postgres
      -c shared_buffers=32MB
      -c work_mem=2MB
      -c maintenance_work_mem=16MB
      -c effective_cache_size=64MB
      -c max_connections=20
      -c wal_buffers=1MB
      -c checkpoint_completion_target=0.9
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 100m
        reservations:
          memory: 50m
    mem_limit: 100m
    memswap_limit: 228m
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # Airflow Scheduler
  # Role: Cloud Infra & DevOps (Vinh, Tín)
  # ---------------------------------------------------------------------------
  scheduler:
    <<: [*common, *depends-on]
    container_name: airflow-scheduler
    command: scheduler
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 350m
        reservations:
          memory: 128m
    mem_limit: 350m
    memswap_limit: 800m

  # ---------------------------------------------------------------------------
  # Airflow Webserver
  # Role: Cloud Infra & DevOps (Vinh, Tín)
  # ---------------------------------------------------------------------------
  webserver:
    <<: [*common, *depends-on]
    container_name: airflow-webserver
    command: webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 400m
        reservations:
          memory: 128m
    mem_limit: 400m
    memswap_limit: 900m

  # ---------------------------------------------------------------------------
  # Airflow Init (runs once on first start)
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *common
    container_name: airflow-init
    user: "0:0"
    entrypoint: /bin/bash
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/{logs,dags}
        exec /entrypoint airflow version

volumes:
  minio-data:
  postgres-data:
  superset-data:
