# =============================================================================
# Docker Compose — Twitter Data Lakehouse
# OPTIMIZED for AWS EC2 t3.micro (1GB RAM + 4GB Swap, Ubuntu 22.04)
#
# Memory Budget (1024MB physical + 4096MB swap = 5120MB total):
#   OS + Docker daemon:  ~200MB (reserved)
#   MinIO:                200MB (limit) + 256MB swap
#   Drill:                384MB (limit) + 384MB swap  ← heaviest (JVM)
#   Superset:             256MB (limit) + 384MB swap
#   Postgres:             100MB (limit) + 128MB swap
#   Airflow Scheduler:    200MB (limit) + 300MB swap
#   Airflow Webserver:    200MB (limit) + 300MB swap
#   ─────────────────────────────────────────────
#   Total physical:      ~1340MB (uses swap for burst)
#   Total swap:          ~1752MB (within 4GB swap budget)
# =============================================================================

x-common:
  &common
  image: lakehouse-airflow
  build:
    context: .
    dockerfile: airflow.Dockerfile
  user: "${AIRFLOW_UID:-50000}:0"
  env_file:
    - .env
  volumes:
    - ./app/dags:/opt/airflow/dags
    - ./app/logs:/opt/airflow/logs
  networks:
    - lakehouse

x-depends-on:
  &depends-on
  depends_on:
    postgres:
      condition: service_healthy
    airflow-init:
      condition: service_completed_successfully

networks:
  lakehouse:
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible Object Storage
  # Role: Cloud Storage (Vinh, Tín)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-01-05T22-17-24Z
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9090:9090'
    volumes:
      - minio-data:/data
    env_file:
      - .env
    environment:
      # >>> MEM: Giới hạn Go GC để MinIO không chiếm quá nhiều RAM
      - GOGC=20
      - GOMEMLIMIT=180MiB
    command: server --console-address ":9090" /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    # >>> MEM: deploy.resources.limits (Docker Compose V3 / Swarm syntax)
    deploy:
      resources:
        limits:
          memory: 200m
        reservations:
          memory: 100m
    # >>> MEM: Fallback limits cho docker-compose V2 (non-Swarm)
    mem_limit: 200m
    memswap_limit: 456m
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # Apache Drill — Distributed SQL Query Engine
  # Role: Cloud Compute (Hoàng, Triệu)
  # ---------------------------------------------------------------------------
  drill:
    image: apache/drill:1.21.1
    restart: unless-stopped
    ports:
      - '8047:8047'
      - '31010:31010'
    volumes:
      - ./conf/drill/core-site.xml:/opt/drill/conf/core-site.xml
      - ./conf/drill/storage-plugins-override.conf:/opt/drill/conf/storage-plugins-override.conf
    environment:
      # >>> MEM: JVM tuning cực kỳ aggressive cho t3.micro
      # DRILL_HEAP: Heap size cho Drill query engine (giảm từ default 4GB)
      - DRILL_HEAP=192m
      # DRILL_MAX_DIRECT_MEMORY: Off-heap buffer cho I/O (giảm từ default 8GB)
      - DRILL_MAX_DIRECT_MEMORY=192m
      # DRILLBIT_MAX_PROC_MEM: Tổng RAM tối đa cho toàn bộ JVM process
      - DRILLBIT_MAX_PROC_MEM=400m
      # >>> MEM: JVM flags bổ sung để giảm memory footprint
      - DRILL_JAVA_OPTS=-XX:MaxMetaspaceSize=128m -XX:ReservedCodeCacheSize=32m -XX:+UseSerialGC -XX:+UseCompressedOops -XX:+UseCompressedClassPointers
    env_file:
      - .env
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: 384m
        reservations:
          memory: 200m
    mem_limit: 384m
    memswap_limit: 768m
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # Apache Superset — BI & Visualization
  # Role: Cloud BI & Visualization (Hoàng, Triệu)
  # ---------------------------------------------------------------------------
  superset:
    build:
      context: .
      dockerfile: superset_drill.Dockerfile
    restart: unless-stopped
    ports:
      - '8088:8088'
    env_file:
      - .env
    volumes:
      - superset-data:/app/superset_home
    environment:
      # >>> MEM: Superset metadata cache nhỏ hơn
      - SUPERSET_WEBSERVER_TIMEOUT=120
    command: >
      bash -c "
      export SUPERSET_SECRET_KEY=$${SUPERSET_SECRET_KEY:-thisisasecretkeythatcanbeanystring123456789} &&
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Admin --lastname Admin --email admin@admin.com --password admin || true &&
      superset init &&
      gunicorn --bind 0.0.0.0:8088 --workers 1 --threads 2 --timeout 120 --limit-request-line 0 --max-requests 50 --max-requests-jitter 10 'superset.app:create_app()'
      "
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    mem_limit: 256m
    memswap_limit: 640m
    depends_on:
      drill:
        condition: service_started
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # PostgreSQL — Airflow Metadata Database
  # Role: Cloud Infra & DevOps (Vinh, Tín)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:13-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    env_file:
      - .env
    environment:
      # >>> MEM: Postgres tuning cho low-memory environment
      - POSTGRES_SHARED_BUFFERS=32MB
      - POSTGRES_WORK_MEM=2MB
      - POSTGRES_MAINTENANCE_WORK_MEM=16MB
      - POSTGRES_EFFECTIVE_CACHE_SIZE=64MB
    command: >
      postgres
      -c shared_buffers=32MB
      -c work_mem=2MB
      -c maintenance_work_mem=16MB
      -c effective_cache_size=64MB
      -c max_connections=20
      -c wal_buffers=1MB
      -c checkpoint_completion_target=0.9
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 100m
        reservations:
          memory: 50m
    mem_limit: 100m
    memswap_limit: 228m
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # Airflow Scheduler
  # Role: Cloud Infra & DevOps (Vinh, Tín)
  # ---------------------------------------------------------------------------
  scheduler:
    <<: [*common, *depends-on]
    container_name: airflow-scheduler
    command: scheduler
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    mem_limit: 256m
    memswap_limit: 512m

  # ---------------------------------------------------------------------------
  # Airflow Webserver
  # Role: Cloud Infra & DevOps (Vinh, Tín)
  # ---------------------------------------------------------------------------
  webserver:
    <<: [*common, *depends-on]
    container_name: airflow-webserver
    command: webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    mem_limit: 256m
    memswap_limit: 512m

  # ---------------------------------------------------------------------------
  # Airflow Init (runs once on first start)
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *common
    container_name: airflow-init
    user: "0:0"
    entrypoint: /bin/bash
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/{logs,dags}
        exec /entrypoint airflow version

volumes:
  minio-data:
  postgres-data:
  superset-data:
